name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"
          git lfs track "*.gif"
          git lfs track "*.webp"
          git lfs track "*.ico"
          git add .gitattributes

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://Sonal-888:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          git remote add hf https://huggingface.co/spaces/Sonal-888/my-video-studio || true
          GIT_LFS_SKIP_SMUDGE=1 git push hf master --force
